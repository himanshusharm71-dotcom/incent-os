<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>INCENT OS | Command Center</title>
    <style>
      body { margin: 0; background: #F8FAFC; }
      #root { min-height: 100vh; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    
    <!-- 3D PARALLAX ENGINE -->
    <script>
      document.addEventListener('mousemove', (e) => {
        const cards = document.querySelectorAll('.card-3d');
        const x = (window.innerWidth / 2 - e.pageX) / 40;
        const y = (window.innerHeight / 2 - e.pageY) / 40;
        
        cards.forEach(card => {
          card.style.transform = `rotateY(${x}deg) rotateX(${-y}deg)`;
        });
      });

      // HOLOGRAPHIC SOUND ENGINE
      const playHoverSound = () => {
        const context = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = context.createOscillator();
        const gain = context.createGain();
        oscillator.type = 'sine';
        oscillator.frequency.setValueAtTime(800, context.currentTime);
        oscillator.frequency.exponentialRampToValueAtTime(0.01, context.currentTime + 0.1);
        gain.gain.setValueAtTime(0.02, context.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, context.currentTime + 0.1);
        oscillator.connect(gain);
        gain.connect(context.destination);
        oscillator.start();
        oscillator.stop(context.currentTime + 0.1);
      };

      document.addEventListener('mouseover', (e) => {
        if (e.target.closest('button') || e.target.closest('.nav-item')) {
          playHoverSound();
        }
      });
    </script>
  </body>
</html>
